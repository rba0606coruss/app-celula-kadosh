    let mesAtual = new Date().getMonth();
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    function formatarDataExibicao(data) {
        if (!data || data === "-" || data === "A caminho") return data;
        const partes = data.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function showView(view) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        const menu = document.getElementById('main-menu');
        const btnVoltar = document.getElementById('btn-voltar');

        if (view === 'menu') {
            menu.classList.remove('hidden');
            menu.classList.add('grid');
            btnVoltar.classList.add('hidden');
        } else {
            menu.classList.remove('grid');
            menu.classList.add('hidden');
            btnVoltar.classList.remove('hidden');
            document.getElementById('view-' + view).classList.add('active');
            if(view === 'celebracoes') renderCelebracoes();
        }
        window.scrollTo(0,0);
    }

    function createCard(p) {
        let cardClass = 'card-t1';
        let labelClass = 'label-t1';
        let fpBg = 'bg-blue-50 text-blue-700 border-blue-100';
        let displayNivel = p.nivel;

        if (p.nivel === 'T2') {
            cardClass = 'card-t2'; labelClass = 'label-t2'; fpBg = 'bg-red-50 text-red-700 border-red-100';
        } else if (p.nivel === 'Formação') {
            cardClass = 'card-formacao'; labelClass = 'label-formacao'; fpBg = 'bg-amber-50 text-amber-700 border-amber-100';
            displayNivel = p.nome.includes("Fernanda") ? "ASSISTENTE" : "FORMADORA";
        }

        const filhosHtml = p.filhos.length > 0 
            ? `<div class="mt-4 p-3 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-[9px] font-black text-slate-400 uppercase mb-2">Filhos:</p>
               ${p.filhos.map(f => `<p class="text-[11px] text-slate-700 font-semibold mb-1">👶 ${f.nome} <span class="font-normal opacity-60">(${formatarDataExibicao(f.nasc)})</span></p>`).join('')}</div>` : '';

        const conjugeHtml = p.conjuge 
            ? `<div class="mt-4 p-3 bg-slate-100/50 rounded-2xl border border-slate-200"><p class="text-[9px] font-black text-slate-500 uppercase mb-2">Cônjuge:</p>
               <p class="text-[11px] text-slate-900 font-bold">💍 ${p.conjuge.nome} <span class="font-normal text-slate-600">(${formatarDataExibicao(p.conjuge.nasc)})</span></p></div>` : '';

        return `
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-white flex flex-col h-full ${cardClass}">
                <div class="mb-5 flex justify-between items-start gap-3">
                    <h3 class="font-bold text-slate-900 leading-tight text-base tracking-tight">${p.nome}</h3>
                    <span class="px-2 py-1 rounded-lg text-[8px] font-black tracking-widest ${labelClass} flex-shrink-0">${displayNivel}</span>
                </div>
                <div class="space-y-3 flex-grow">
                    <div class="flex items-start gap-3"><span class="text-xs opacity-50">📍</span> <p class="text-[11px] text-slate-500 leading-relaxed">${p.end}</p></div>
                    <div class="flex items-start gap-6 mt-4 pt-4 border-t border-slate-50">
                        <div><p class="text-[8px] font-black text-slate-400 uppercase mb-1">Nascimento</p><p class="text-[11px] font-bold text-slate-700">${formatarDataExibicao(p.nasc)}</p></div>
                        ${p.casam !== '-' ? `<div><p class="text-[8px] font-black text-slate-400 uppercase mb-1">Casamento</p><p class="text-[11px] font-bold text-slate-700">${formatarDataExibicao(p.casam)}</p></div>` : ''}
                    </div>
                </div>
                ${conjugeHtml}${filhosHtml}
                <div class="mt-6 p-4 rounded-2xl border ${fpBg} flex items-center justify-between">
                    <div><p class="text-[8px] font-black uppercase tracking-[0.15em] opacity-60">Formador Pessoal</p><p class="text-xs font-bold">${p.fp}</p></div>
                    <span class="text-lg opacity-20">🛡️</span>
                </div>
            </div>
        `;
    }

    function renderCelebracoes() {
        document.getElementById('titulo-mes').innerText = meses[mesAtual];
        const container = document.getElementById('lista-eventos');
        container.innerHTML = '';

        let nivers = [];
        let casamentos = [];
        let nomesJaAdicionados = new Set(); 

        membros.forEach(p => {
            const mN = parseInt(p.nasc.split('-')[1]);
            const dN = parseInt(p.nasc.split('-')[2]);
            if (mN === (mesAtual + 1) && !nomesJaAdicionados.has(p.nome)) {
                nivers.push({ dia: dN, nome: p.nome, desc: 'Célula' });
                nomesJaAdicionados.add(p.nome);
            }

            if (p.conjuge) {
                const mC = parseInt(p.conjuge.nasc.split('-')[1]);
                const dC = parseInt(p.conjuge.nasc.split('-')[2]);
                if (mC === (mesAtual + 1) && !nomesJaAdicionados.has(p.conjuge.nome)) {
                    nivers.push({ dia: dC, nome: p.conjuge.nome, desc: `Cônjuge de ${p.nome.split(' ')[0]}` });
                    nomesJaAdicionados.add(p.conjuge.nome);
                }
            }

            p.filhos.forEach(f => {
                if (f.nasc !== "A caminho") {
                    const mF = parseInt(f.nasc.split('-')[1]);
                    const dF = parseInt(f.nasc.split('-')[2]);
                    if (mF === (mesAtual + 1) && !nomesJaAdicionados.has(f.nome)) {
                        nivers.push({ dia: dF, nome: f.nome, desc: `Filho(a) de ${p.nome.split(' ')[0]}` });
                        nomesJaAdicionados.add(f.nome);
                    }
                }
            });

            if (p.casam !== '-') {
                const mCa = parseInt(p.casam.split('-')[1]);
                const dCa = parseInt(p.casam.split('-')[2]);
                if (mCa === (mesAtual + 1)) {
                    const idCasal = [p.nome, p.conjuge?.nome].sort().join('|');
                    if (!nomesJaAdicionados.has(idCasal)) {
                        casamentos.push({ dia: dCa, nome: p.conjuge ? `${p.nome.split(' ')[0]} & ${p.conjuge.nome.split(' ')[0]}` : p.nome });
                        nomesJaAdicionados.add(idCasal);
                    }
                }
            }
        });

        nivers.sort((a, b) => a.dia - b.dia);
        casamentos.sort((a, b) => a.dia - b.dia);

        let html = '';
        if (nivers.length > 0) {
            html += `<div><p class="text-[10px] font-black text-slate-400 uppercase mb-5 tracking-widest px-2">🎂 Aniversários</p><div class="space-y-3">`;
            nivers.forEach(n => {
                html += `<div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <div><p class="text-sm font-bold text-slate-800">${n.nome}</p><p class="text-[10px] text-red-600 font-bold uppercase tracking-tight">${n.desc}</p></div>
                    <span class="bg-red-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black shadow-lg shadow-red-200">Dia ${n.dia}</span>
                </div>`;
            });
            html += `</div></div>`;
        }

        if (casamentos.length > 0) {
            html += `<div><p class="text-[10px] font-black text-slate-400 uppercase mb-5 tracking-widest px-2">💍 Uniões</p><div class="space-y-3">`;
            casamentos.forEach(c => {
                html += `<div class="flex justify-between items-center p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
                    <p class="text-sm font-bold text-slate-800">${c.nome}</p>
                    <span class="bg-blue-600 text-white px-3 py-1.5 rounded-xl text-[10px] font-black shadow-lg shadow-blue-200">Dia ${c.dia}</span>
                </div>`;
            });
            html += `</div></div>`;
        }

        container.innerHTML = html || '<p class="text-center text-slate-400 text-sm py-12 col-span-2">Sem eventos para este mês.</p>';
    }

    function mudarMes(delta) { mesAtual = (mesAtual + delta + 12) % 12; renderCelebracoes(); }

    window.onload = () => {
        document.getElementById('grid-t2').innerHTML = membros.filter(m => m.nivel === 'T2').map(createCard).join('');
        document.getElementById('grid-t1').innerHTML = membros.filter(m => m.nivel === 'T1').map(createCard).join('');
        document.getElementById('grid-formadoras').innerHTML = membros.filter(m => m.nivel === 'Formação').map(createCard).join('');
        renderCelebracoes();
    };
</script>

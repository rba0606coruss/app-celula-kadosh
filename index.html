    let mesAtual = new Date().getMonth();
    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    function formatarDataExibicao(data) {
        if (!data || data === "-" || data === "A caminho") return data;
        const partes = data.split('-');
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function createCard(p) {
        let cardClass = 'card-t1';
        let labelClass = 'label-t1';
        let fpBg = 'bg-blue-50 text-blue-700 border-blue-100';
        let displayNivel = p.nivel;

        if (p.nivel === 'T2') {
            cardClass = 'card-t2'; labelClass = 'label-t2'; fpBg = 'bg-red-50 text-red-700 border-red-100';
        } else if (p.nivel === 'Formação') {
            cardClass = 'card-formacao'; labelClass = 'label-formacao'; fpBg = 'bg-amber-50 text-amber-700 border-amber-100';
            displayNivel = p.nome.includes("Fernanda") ? "ASSISTENTE" : "FORMADORA";
        }

        const filhosHtml = p.filhos.length > 0 
            ? `<div class="mt-3 p-2 bg-slate-50 rounded-xl border border-slate-100"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Filhos:</p>
               ${p.filhos.map(f => `<p class="text-xs text-slate-600 font-medium">• ${f.nome} (${formatarDataExibicao(f.nasc)})</p>`).join('')}</div>` : '';

        const conjugeHtml = p.conjuge 
            ? `<div class="mt-3 p-2 bg-slate-100 rounded-xl border border-slate-200"><p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Cônjuge:</p>
               <p class="text-xs text-slate-900 font-bold">${p.conjuge.nome} <span class="font-normal text-slate-600">(${formatarDataExibicao(p.conjuge.nasc)})</span></p></div>` : '';

        return `
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 flex flex-col h-full ${cardClass}">
                <div class="mb-4 flex justify-between items-start">
                    <div class="pr-2">
                        <h3 class="font-bold text-slate-900 leading-tight text-lg">${p.nome}</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">Ministério: <span class="text-slate-600">${p.ministerio}</span></p>
                    </div>
                    <span class="px-3 py-1 rounded-full text-[10px] font-black tracking-tighter ${labelClass}">${displayNivel}</span>
                </div>
                <div class="space-y-2 flex-grow">
                    <div class="flex items-start gap-2"><span class="text-sm">📧</span> <p class="text-xs text-slate-600 break-all">${p.email}</p></div>
                    <div class="flex items-start gap-2"><span class="text-sm">📍</span> <p class="text-xs text-slate-600 leading-relaxed">${p.end}</p></div>
                    <div class="flex items-start gap-3 mt-4 pt-3 border-t border-slate-50">
                        <div><p class="text-[9px] font-bold text-slate-400 uppercase">Nascimento</p><p class="text-xs font-bold text-slate-700">${formatarDataExibicao(p.nasc)}</p></div>
                        ${p.casam !== '-' ? `<div><p class="text-[9px] font-bold text-slate-400 uppercase">Casamento</p><p class="text-xs font-bold text-slate-700">${formatarDataExibicao(p.casam)}</p></div>` : ''}
                    </div>
                </div>
                ${conjugeHtml}${filhosHtml}
                <div class="mt-5 p-3 rounded-2xl border ${fpBg} flex items-center justify-between">
                    <div><p class="text-[9px] font-black uppercase tracking-widest opacity-70">Formador Pessoal (FP)</p><p class="text-sm font-bold">${p.fp}</p></div>
                    <span class="text-lg opacity-40">🛡️</span>
                </div>
            </div>
        `;
    }

    function renderCelebrações() {
        document.getElementById('titulo-mes').innerText = meses[mesAtual];
        const container = document.getElementById('lista-eventos');
        container.innerHTML = '';

        let nivers = [];
        let casamentos = [];
        let nomesJaAdicionados = new Set(); 

        membros.forEach(p => {
            const mN = parseInt(p.nasc.split('-')[1]);
            const dN = parseInt(p.nasc.split('-')[2]);
            if (mN === (mesAtual + 1) && !nomesJaAdicionados.has(p.nome)) {
                nivers.push({ dia: dN, nome: p.nome, desc: 'Célula' }); // Alterado de "Membro" para "Célula"
                nomesJaAdicionados.add(p.nome);
            }

            if (p.conjuge) {
                const mC = parseInt(p.conjuge.nasc.split('-')[1]);
                const dC = parseInt(p.conjuge.nasc.split('-')[2]);
                if (mC === (mesAtual + 1) && !nomesJaAdicionados.has(p.conjuge.nome)) {
                    nivers.push({ dia: dC, nome: p.conjuge.nome, desc: `Cônjuge de ${p.nome.split(' ')[0]}` });
                    nomesJaAdicionados.add(p.conjuge.nome);
                }
            }

            p.filhos.forEach(f => {
                if (f.nasc !== "A caminho") {
                    const mF = parseInt(f.nasc.split('-')[1]);
                    const dF = parseInt(f.nasc.split('-')[2]);
                    if (mF === (mesAtual + 1) && !nomesJaAdicionados.has(f.nome)) {
                        nivers.push({ dia: dF, nome: f.nome, desc: `Filho(a) de ${p.nome.split(' ')[0]}` });
                        nomesJaAdicionados.add(f.nome);
                    }
                }
            });

            if (p.casam !== '-') {
                const mCa = parseInt(p.casam.split('-')[1]);
                const dCa = parseInt(p.casam.split('-')[2]);
                if (mCa === (mesAtual + 1)) {
                    const idCasal = [p.nome, p.conjuge?.nome].sort().join('|');
                    if (!nomesJaAdicionados.has(idCasal)) {
                        casamentos.push({ dia: dCa, nome: p.conjuge ? `${p.nome.split(' ')[0]} & ${p.conjuge.nome.split(' ')[0]}` : p.nome });
                        nomesJaAdicionados.add(idCasal);
                    }
                }
            }
        });

        nivers.sort((a, b) => a.dia - b.dia);
        casamentos.sort((a, b) => a.dia - b.dia);

        let html = '';
        if (nivers.length > 0) {
            html += `<div><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">🎂 Aniversariantes</p><div class="space-y-2">`;
            nivers.forEach(n => {
                html += `<div class="flex justify-between items-center p-4 bg-red-50 rounded-2xl border border-red-100">
                    <div><p class="text-sm font-bold text-slate-800">${n.nome}</p><p class="text-[10px] text-red-600 font-bold uppercase">${n.desc}</p></div>
                    <span class="bg-red-600 text-white px-3 py-1 rounded-lg text-xs font-black">Dia ${n.dia}</span>
                </div>`;
            });
            html += `</div></div>`;
        }

        if (casamentos.length > 0) {
            html += `<div class="mt-4"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">💍 Casamentos</p><div class="space-y-2">`;
            casamentos.forEach(c => {
                html += `<div class="flex justify-between items-center p-4 bg-blue-50 rounded-2xl border border-blue-100">
                    <p class="text-sm font-bold text-slate-800">${c.nome}</p>
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-black">Dia ${c.dia}</span>
                </div>`;
            });
            html += `</div></div>`;
        }

        container.innerHTML = html || '<p class="text-center text-slate-400 text-sm py-10">Nenhuma celebração este mês.</p>';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-pill').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.getElementById('btn-' + tab).classList.add('active');
        if(tab === 'celebrações') renderCelebrações();
    }

    function mudarMes(delta) { mesAtual = (mesAtual + delta + 12) % 12; renderCelebrações(); }

    window.onload = () => {
        document.getElementById('grid-t2').innerHTML = membros.filter(m => m.nivel === 'T2').map(createCard).join('');
        document.getElementById('grid-t1').innerHTML = membros.filter(m => m.nivel === 'T1').map(createCard).join('');
        document.getElementById('grid-formadoras').innerHTML = membros.filter(m => m.nivel === 'Formação').map(createCard).join('');
        renderCelebrações();
    };
</script>
